name: Bug report
description: Report a defect, regression or incorrect system claim.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce the issue and evaluate risk.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken or misleading?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What user, system or operational impact does this have?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Commands, config, chain and exact steps to reproduce.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs, manifests or explorer links
      description: Paste the relevant evidence here.
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Execution plane
        - Assurance plane
        - Tooling / CI
        - Documentation
        - Security
    validations:
      required: true
