name: Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '19 4 * * 1'

permissions:
  contents: read
  security-events: write

env:
  RECIPIENT_A: 0x0000000000000000000000000000000000001001
  RECIPIENT_B: 0x0000000000000000000000000000000000001002
  RECIPIENT_C: 0x0000000000000000000000000000000000001003

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build
        run: npm run build

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm run audit:npm

  contract-static-analysis:
    name: Contract static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Solidity lint
        run: npm run lint:sol
