name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  RECIPIENT_A: 0x0000000000000000000000000000000000001001
  RECIPIENT_B: 0x0000000000000000000000000000000000001002
  RECIPIENT_C: 0x0000000000000000000000000000000000001003

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Validate release candidate
        run: |
          npm run lint
          npm run build
          npm test

  release-please:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Release Please
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
