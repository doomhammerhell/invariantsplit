[profile.default]
src = "src"
test = "tests"
script = "scripts"
out = "out"
libs = []
optimizer = true
optimizer_runs = 1000000
evm_version = "paris"
solc_version = "0.8.30"
ffi = true
gas_reports = ["SplitSolidity"]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "params_first"
number_underscore = "thousands"
quote_style = "double"
wrap_comments = true
